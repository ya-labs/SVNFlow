<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVNFlow</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">YA LABS</p>
          <h1 data-role="app-title">SVNFlow</h1>
          <p class="subtitle" data-role="app-subtitle">Carregando shell...</p>
        </div>
        <div class="status-pill" data-role="app-status">Iniciando renderer...</div>
      </header>

      <section class="layout-grid">
        <aside class="nav-panel">
          <h2>Etapas da V1</h2>
          <nav data-role="stage-nav" aria-label="Navegação principal">
            <ul class="stage-list" data-role="stage-list"></ul>
          </nav>
        </aside>

        <section class="content-panel" aria-live="polite">
          <article class="content-card">
            <p class="card-label">Área principal</p>
            <h2 data-role="stage-title">Ambiente</h2>
            <p data-role="stage-description">Carregando descrição...</p>
          </article>

          <article class="content-card">
            <p class="card-label">Contexto do ambiente ativo</p>
            <p class="context-line">Status: <strong data-role="environment-status">Não configurado</strong></p>
            <p class="context-line">Workspace Git: <span data-role="environment-git">Não informado</span></p>
            <p class="context-line">Checkout SVN: <span data-role="environment-svn">Não informado</span></p>
          </article>
        </section>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
